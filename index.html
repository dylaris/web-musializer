<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Web Musializer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="visualizer-canvas"></canvas>
  <div class="ui-panel" id="uiPanel">
    <div class="panel-header">
      <h2>🎵 MUSIALIZER</h2>
      <button class="toggle-panel-btn" id="collapsePanelBtn">✕</button>
    </div>
    <div class="playlist-section" id="playlistContainer">
      <div class="empty-playlist">🎤 Click below to add music</div>
    </div>
    <div class="controls">
      <div class="progress-area">
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>
        <input type="range" id="progressSlider" value="0" step="0.01">
      </div>
      <div class="buttons-row">
        <button class="ctrl-btn" id="prevBtn" title="Previous">⏮</button>
        <button class="ctrl-btn" id="playPauseBtn" title="Play/Pause">▶</button>
        <button class="ctrl-btn" id="nextBtn" title="Next">⏭</button>
      </div>
      <div class="mode-buttons">
        <button class="mode-btn" data-mode="list">📋 List Loop</button>
        <button class="mode-btn" data-mode="shuffle">🎲 Shuffle</button>
        <button class="mode-btn" data-mode="loop">🔂 Loop One</button>
      </div>
      <div class="upload-area">
        <button class="upload-btn" id="uploadBtn">➕ Add Music (MP3/WAV/OGG)</button>
        <input type="file" id="fileInput" multiple accept="audio/*" style="display:none">
      </div>
      <div class="now-playing" id="nowPlayingLabel">✨ No track loaded</div>
    </div>
  </div>
  <div class="edge-reveal" id="edgeRevealBtn">
    <button class="reveal-btn">🎛️</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
